<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="220" style="border-radius: 12px;">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c10" />
      <stop offset="50%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <!-- Text Neon Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A77CF7" />
      <stop offset="50%" stop-color="#F85D7F" />
      <stop offset="100%" stop-color="#00E5FF" />
    </linearGradient>

    <!-- Border Neon Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7F3FBF" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#FF2A85" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.8" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Background Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#7F3FBF" stroke-width="1" stroke-opacity="0.07" />
    </pattern>
  </defs>

  <!-- Background Rect -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="12" />
  
  <!-- Subtle Grid Overlay -->
  <rect width="100%" height="100%" fill="url(#grid)" rx="12" />

  <!-- Ambient Glows (Behind Text) -->
  <circle cx="100" cy="110" r="80" fill="#7F3FBF" opacity="0.15" filter="url(#glow-purple)" />
  <circle cx="700" cy="110" r="60" fill="#00E5FF" opacity="0.1" filter="url(#glow-cyan)" />

  <!-- Border Outline for Premium Look -->
  <rect x="1" y="1" width="798" height="218" fill="none" stroke="url(#border-grad)" stroke-width="2" rx="11" />

  <!-- Decorative Cyberpunk Accents -->
  <!-- Top Right tech accents -->
  <path d="M 680 20 L 780 20 L 780 70" fill="none" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.3" />
  <rect x="772" y="12" width="4" height="4" fill="#00E5FF" opacity="0.6" />
  <rect x="760" y="12" width="8" height="4" fill="#A77CF7" opacity="0.4" />

  <!-- Bottom Left tech accents -->
  <path d="M 120 200 L 20 200 L 20 150" fill="none" stroke="#A77CF7" stroke-width="1" stroke-opacity="0.3" />
  <circle cx="20" cy="140" r="2" fill="#A77CF7" opacity="0.6" />
  <line x1="28" y1="208" x2="68" y2="208" stroke="#00E5FF" stroke-width="2" stroke-opacity="0.5" />

  <!-- Core Content (Left-Aligned or Center) -->
  <g transform="translate(60, 0)">
    <!-- Small Tagline/Prefix -->
    <text x="0" y="70" fill="#00E5FF" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" letter-spacing="3" opacity="0.9">
      &gt; THOUGHTFUL VIBE CODING
    </text>
    
    <!-- Main Header -->
    <text x="0" y="125" fill="url(#text-grad)" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="800" letter-spacing="1">
      Hey, I'm Mio
    </text>

    <!-- Subtitle / Bio -->
    <text x="0" y="165" fill="#8B949E" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400" letter-spacing="0.5">
      Learning front-end, crafting clean code &amp; enjoying the process
    </text>

    <!-- Small status indicator -->
    <circle cx="410" cy="65" r="4" fill="#00E5FF" filter="url(#glow-cyan)" />
    <text x="422" y="69" fill="#8B949E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" letter-spacing="1" opacity="0.8">
      STATUS: VIBING &amp; BUILDING CAREFULLY
    </text>
  </g>

  <!-- Interactive/decorative code tag -->
  <text x="700" y="195" fill="#8B949E" font-family="monospace" font-size="12" opacity="0.3">&lt;/mio&gt;</text>
</svg>
